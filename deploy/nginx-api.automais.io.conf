# api.automais.io — API + WebSockets (hosts SSH, remote VNC, routeros, SignalR)
# Arquivo no servidor: /etc/nginx/sites-available/automais-api
# Par: nginx-automais.io.conf (front automais.io — só se o browser usar /api nesse host)
#
# Upstream: HTTPS 127.0.0.1:5001 (Kestrel com ASPNETCORE_URLS do systemd).
#
# O front em produção costuma usar VITE_API_BASE_URL=https://api.automais.io/api → todo tráfego
# de API/WS passa por ESTE arquivo; o location /api do automais.io.io fica só para fallback.
#
# Depois de editar: sudo nginx -t && sudo systemctl reload nginx

# WebSocket: Connection header para handshake
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Produção: backend em HTTPS na porta 5001.
# CORS é tratado pelo backend ASP.NET (UseCors "AllowFrontend" em Program.cs).
upstream backend_api {
    server 127.0.0.1:5001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    server_name api.automais.io;

    access_log /var/log/nginx/automais-api-access.log;
    error_log  /var/log/nginx/automais-api-error.log;

    client_max_body_size 20M;

    # JWT na query do WebSocket (/api/ws/hosts, /api/ws/remote) pode exceder buffers padrão do nginx
    large_client_header_buffers 4 16k;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location /health {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # SignalR (WebSocket) — front chama /api/hubs, backend escuta em /hubs
    location /api/hubs {
        rewrite ^/api/hubs(.*)$ /hubs$1 break;
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # RouterOS WebSocket — NAT, Firewall, Terminal (front: /api/ws/routeros/{routerId})
    location /api/ws/routeros/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    # Hosts WebSocket — console SSH Linux (front: /api/ws/hosts/{hostId}?access_token=…)
    # A query pode conter JWT; evite logar $request_uri completo em access_log se for sensível.
    location /api/ws/hosts/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    # Remote WebSocket — display VNC (front: /api/ws/remote/{hostId}?access_token=…)
    location /api/ws/remote/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    # WebDevice WebSocket — agente no firmware (ESP: /api/ws/webdevice/agent/{DevEUI}?token=…)
    location /api/ws/webdevice/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    # WebDevice UI proxy HTTP — iframe do painel (timeouts longos; antes do /api genérico)
    location ~* "^/api/devices/[0-9A-Fa-f]{8,128}/web-ui" {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # API — todas as rotas /api/*
    location /api {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Swagger — restrito por IP
    location /swagger {
        # allow SEU_IP_AQUI;
        # deny all;
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Qualquer outra rota — 404
    location / {
        return 404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.automais.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.automais.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.automais.io;

    # WebDevice agent WS sem TLS — ESP8266 conecta aqui (economiza ~15 KB de heap BearSSL).
    # Apenas o path do agente é aceito em HTTP; todo o resto redireciona para HTTPS.
    location /api/ws/webdevice/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# WebDevice WS sem TLS — porta 5004 (alternativa à 80) para redes com proxy em 80/443.
# Firewall / security group: liberar TCP 5004 → este host.
# Firmware / DeviceSim: WEBDEVICE_PORT / ws_port = 5004
server {
    listen 5004;
    listen [::]:5004;
    server_name api.automais.io;

    access_log /var/log/nginx/automais-api-ws5004-access.log;
    error_log  /var/log/nginx/automais-api-ws5004-error.log;

    large_client_header_buffers 4 16k;

    location /api/ws/webdevice/ {
        proxy_pass https://backend_api;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        return 404;
    }
}
