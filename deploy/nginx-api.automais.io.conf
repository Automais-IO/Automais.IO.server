# Configuração Nginx para api.automais.io (subdomínio da API)
# O front chama https://api.automais.io/api/auth/login e outras rotas em /api
#
# Copiar para: /etc/nginx/sites-available/api.automais.io
# Depois: sudo ln -s /etc/nginx/sites-available/api.automais.io /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d api.automais.io

# CORS: origem permitida para respostas (reflete Origin quando permitido)
map $http_origin $cors_origin {
    default "";
    "~^https://(www\.)?automais\.io$" $http_origin;
    "http://localhost:3000" $http_origin;
    "http://localhost:5173" $http_origin;
}

upstream backend_api {
    server localhost:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.automais.io;

    access_log /var/log/nginx/automais-api-access.log;
    error_log /var/log/nginx/automais-api-error.log;

    # Health check
    location /health {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # SignalR (WebSocket) – front chama /api/hubs, backend escuta em /hubs
    location /api/hubs {
        rewrite ^/api/hubs(.*)$ /hubs$1 break;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }

    # API (inclui /api/auth/login e demais rotas)
    location /api {
        # CORS preflight: responder OPTIONS com 204 e headers (evita bloqueio no browser)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # CORS: adicionar headers na resposta da API (always = também em 4xx/5xx)
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # Swagger (se exposto)
    location /swagger {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root / na API (ex.: health em /health já coberto; qualquer outra coisa 404)
    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# NOTA: Para HTTPS, após instalar o arquivo:
#   sudo certbot --nginx -d api.automais.io
# O Certbot adicionará automaticamente listen 443 ssl e os certificados.
